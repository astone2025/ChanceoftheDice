    </footer>

    <script>
        const c = new CETEI();
        const behaviors = {
            "tei": {
                "lb": ["<br>"],
            }
        };
        c.addBehaviors(behaviors);
        c.getHTML5('Hammond-Chaunce-tei.xml', function(data) {
            document.getElementById("tei-container").appendChild(data);
            // Execute hash handling after content is loaded
            setTimeout(handleHash, 100);
        });

        function handleHash() {
            const hash = window.location.hash;
            if (hash) {
                const id = hash.substring(1);
                // CETEIcean converts xml:id to id on the custom element
                const target = document.getElementById(id);
                
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    target.classList.add('highlight-stanza');
                } else {
                    window.location.href = 'lost.html';
                }
            }
        }

        window.addEventListener('hashchange', handleHash);
    </script>
</body>
